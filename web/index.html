<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>textxover</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
    color: #fff;
  }

  .input-area {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  #comment-input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #16213e;
    color: #fff;
    font-size: 16px;
    outline: none;
    resize: none;
    height: 80px;
    font-family: inherit;
    line-height: 1.4;
  }

  #comment-input:focus {
    border-color: #0f3460;
  }

  #comment-input::placeholder {
    color: #666;
  }

  #send-btn {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #e94560;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
  }

  #send-btn:hover {
    background: #c73e54;
  }

  #send-btn:active {
    transform: scale(0.96);
  }

  .options {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .option-group {
    flex: 1;
    min-width: 120px;
  }

  .option-group label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }

  .option-group select {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #16213e;
    color: #fff;
    font-size: 14px;
    outline: none;
  }

  .colors {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .colors label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
    width: 100%;
  }

  .color-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .color-btn:hover {
    border-color: #888;
  }

  .color-btn.selected {
    border-color: #fff;
  }

  .reactions {
    margin-bottom: 16px;
  }

  .reactions label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }

  .reaction-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .reaction-btn {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #16213e;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.15s;
  }

  .reaction-btn:hover {
    background: #2a2a3e;
  }

  .reaction-btn:active {
    transform: scale(1.2);
  }

  .effect-area {
    text-align: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #333;
  }

  #firework-btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: 1px solid #444;
    background: transparent;
    color: #f5a623;
    font-size: 14px;
    cursor: pointer;
  }

  #firework-btn:hover, #pip-btn:hover {
    background: #2a2a3e;
  }

  #pip-btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: 1px solid #444;
    background: transparent;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    margin-left: 8px;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
  }
</style>
</head>
<body>
<div class="container">
  <h1>textxover</h1>

  <div class="input-area">
    <textarea id="comment-input" placeholder="コメントを入力... (Cmd+Enter で送信)" maxlength="100" autofocus></textarea>
    <button id="send-btn">送信</button>
  </div>

  <div class="colors">
    <label>Color</label>
    <button class="color-btn selected" data-color="#FFFFFF" style="background:#fff"></button>
    <button class="color-btn" data-color="#FF0000" style="background:#f00"></button>
    <button class="color-btn" data-color="#FF8800" style="background:#f80"></button>
    <button class="color-btn" data-color="#FFFF00" style="background:#ff0"></button>
    <button class="color-btn" data-color="#00FF00" style="background:#0f0"></button>
    <button class="color-btn" data-color="#00FFFF" style="background:#0ff"></button>
    <button class="color-btn" data-color="#0088FF" style="background:#08f"></button>
    <button class="color-btn" data-color="#FF00FF" style="background:#f0f"></button>
    <button class="color-btn" data-color="#FF88CC" style="background:#f8c"></button>
  </div>

  <div class="options">
    <div class="option-group">
      <label>Size</label>
      <select id="size-select">
        <option value="medium" selected>Medium</option>
        <option value="big">Big</option>
        <option value="small">Small</option>
      </select>
    </div>
    <div class="option-group">
      <label>Position</label>
      <select id="type-select">
        <option value="scroll" selected>Scroll</option>
        <option value="top">Top (fixed)</option>
        <option value="bottom">Bottom (fixed)</option>
      </select>
    </div>
  </div>

  <div class="reactions">
    <label>Reaction</label>
    <div class="reaction-btns">
      <button class="reaction-btn" data-emoji="👍">👍</button>
      <button class="reaction-btn" data-emoji="❤️">❤️</button>
      <button class="reaction-btn" data-emoji="😂">😂</button>
      <button class="reaction-btn" data-emoji="🎉">🎉</button>
      <button class="reaction-btn" data-emoji="👏">👏</button>
      <button class="reaction-btn" data-emoji="😮">😮</button>
      <button class="reaction-btn" data-emoji="🔥">🔥</button>
      <button class="reaction-btn" data-emoji="😭">😭</button>
    </div>
  </div>

  <div class="effect-area">
    <button id="firework-btn">Firework</button>
    <button id="pip-btn">Mini Window</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = window.location.origin;
  let selectedColor = '#FFFFFF';

  // Color selection
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.color-btn.selected')?.classList.remove('selected');
      btn.classList.add('selected');
      selectedColor = btn.dataset.color;
    });
  });

  // Send comment
  async function sendComment() {
    const input = document.getElementById('comment-input');
    const text = input.value.trim();
    if (!text) return;

    const body = {
      text,
      color: selectedColor,
      size: document.getElementById('size-select').value,
      type: document.getElementById('type-select').value,
    };

    try {
      await fetch(`${API}/comment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      input.value = '';
      input.focus();
    } catch (e) {
      showToast('Connection error');
    }
  }

  document.getElementById('send-btn').addEventListener('click', sendComment);
  document.getElementById('comment-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      sendComment();
    }
  });

  // Emoji reactions
  document.querySelectorAll('.reaction-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      try {
        await fetch(`${API}/comment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text: btn.dataset.emoji,
            size: 'big',
            type: 'scroll',
          }),
        });
      } catch (e) {}
    });
  });

  // Firework
  document.getElementById('firework-btn').addEventListener('click', async () => {
    try {
      await fetch(`${API}/effect`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'firework',
          x: 0.3 + Math.random() * 0.4,
          y: 0.3 + Math.random() * 0.4,
        }),
      });
    } catch (e) {
      showToast('Connection error');
    }
  });

  // Picture-in-Picture mini window
  document.getElementById('pip-btn').addEventListener('click', async () => {
    if (!('documentPictureInPicture' in window)) {
      showToast('This browser does not support Document PiP');
      return;
    }

    try {
      const pipWindow = await documentPictureInPicture.requestWindow({
        width: 440,
        height: 380,
      });

      // Copy stylesheets to PiP window
      for (const sheet of document.styleSheets) {
        const style = pipWindow.document.createElement('style');
        for (const rule of sheet.cssRules) {
          style.textContent += rule.cssText + '\n';
        }
        pipWindow.document.head.appendChild(style);
      }

      // Clone container into PiP window
      const clone = document.querySelector('.container').cloneNode(true);
      // Remove the Mini Window button from clone
      clone.querySelector('#pip-btn')?.remove();
      pipWindow.document.body.appendChild(clone);

      // Wire up events on cloned elements
      const pipInput = clone.querySelector('#comment-input');
      const pipSendBtn = clone.querySelector('#send-btn');
      pipInput.focus();

      // Color selection
      clone.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          clone.querySelector('.color-btn.selected')?.classList.remove('selected');
          btn.classList.add('selected');
          selectedColor = btn.dataset.color;
        });
      });

      // Send comment
      async function pipSendComment() {
        const text = pipInput.value.trim();
        if (!text) return;
        try {
          await fetch(`${API}/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              text,
              color: selectedColor,
              size: clone.querySelector('#size-select').value,
              type: clone.querySelector('#type-select').value,
            }),
          });
          pipInput.value = '';
          pipInput.focus();
        } catch (e) {}
      }

      pipSendBtn.addEventListener('click', pipSendComment);
      pipInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          pipSendComment();
        }
      });

      // Firework
      clone.querySelector('#firework-btn')?.addEventListener('click', async () => {
        try {
          await fetch(`${API}/effect`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'firework',
              x: 0.3 + Math.random() * 0.4,
              y: 0.3 + Math.random() * 0.4,
            }),
          });
        } catch (e) {}
      });

    } catch (e) {
      showToast('Failed to open mini window');
    }
  });

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
